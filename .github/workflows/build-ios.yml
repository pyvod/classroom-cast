name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'ios/**'

jobs:
  build:
    runs-on: macos-14
    defaults:
      run:
        working-directory: ios

    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: |
          curl -LO https://github.com/yonaskolb/XcodeGen/releases/download/2.42.0/xcodegen.zip
          unzip -q xcodegen.zip -d xcodegen
          echo "$(pwd)/xcodegen" >> $GITHUB_PATH

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build (unsigned)
        run: |
          xcodebuild -project ClassroomCast.xcodeproj \
            -scheme ClassroomCast \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            OTHER_CODE_SIGN_FLAGS="--generate-entitlement-der"

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/ClassroomCast.app Payload/
          zip -r ClassroomCast.ipa Payload
          rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ClassroomCast-iOS
          path: ios/ClassroomCast.ipa
